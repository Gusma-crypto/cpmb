name: ${COMPOSE_PROJECT_NAME:-cpmb}

services:
  app:
    image: ${APP_IMAGE:-cpmb-php}:${IMAGE_TAG:-latest}
    restart: ${CONTAINER_RESTART:-unless-stopped}
    working_dir: /var/www
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./.env.docker:/var/www/.env:ro
      - ./storage/app/public:/var/www/storage/app/public
      - ./storage/logs:/var/www/storage/logs
      - ./storage/framework/sessions:/var/www/storage/framework/sessions
      - ./storage/framework/cache:/var/www/storage/framework/cache
      - ./storage/framework/views:/var/www/storage/framework/views
      - ./bootstrap/cache:/var/www/bootstrap/cache
      - app-public:/var/www/public-shared
    networks:
      - app-network

  queue:
    image: ${APP_IMAGE:-cpmb-php}:${IMAGE_TAG:-latest}
    restart: ${CONTAINER_RESTART:-unless-stopped}
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    env_file:
      - .env.docker
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./.env.docker:/var/www/.env:ro
      - ./storage/app/public:/var/www/storage/app/public
      - ./storage/logs:/var/www/storage/logs
      - ./storage/framework/sessions:/var/www/storage/framework/sessions
      - ./storage/framework/cache:/var/www/storage/framework/cache
      - ./storage/framework/views:/var/www/storage/framework/views
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - app-network

  web:
    image: nginx:1.27-alpine
    restart: ${CONTAINER_RESTART:-unless-stopped}
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/public:ro
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    restart: ${CONTAINER_RESTART:-unless-stopped}
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cpmb}
      POSTGRES_USER: ${DB_USERNAME:-cpmb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cpmb} -d ${DB_DATABASE:-cpmb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: ${CONTAINER_RESTART:-unless-stopped}
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - app-network

volumes:
  app-public:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge
